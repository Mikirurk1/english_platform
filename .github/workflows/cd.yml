# Publish production container images to GitHub Container Registry (GHCR).
# Deployment to your host (VPS/K8s) is configured via GitHub Environment secrets — see docs/reference/ci-cd.md

name: CD

on:
  push:
    branches: [main, master]
    tags: ['v*.*.*', 'v*.*.*-*']
  workflow_dispatch:
    inputs:
      deploy:
        description: Run deploy step after image push (requires Environment secrets)
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io

jobs:
  build-push:
    name: Build & push images
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            dockerfile: infra/docker/api.prod.Dockerfile
            image: api
          - service: web
            dockerfile: infra/docker/web.prod.Dockerfile
            image: web
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
          build-args: |
            NEXT_PUBLIC_API_URL=/api

  deploy-staging:
    name: Deploy (staging)
    needs: build-push
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true'
    runs-on: ubuntu-latest
    environment: staging
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Deploy placeholder
        env:
          API_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/api:sha-${{ github.sha }}
          WEB_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/web:sha-${{ github.sha }}
        run: |
          echo "Configure GitHub Environment 'staging' with deploy secrets (see docs/reference/ci-cd.md)."
          echo "API_IMAGE=$API_IMAGE"
          echo "WEB_IMAGE=$WEB_IMAGE"
          echo "Example: SSH to host, docker compose pull && docker compose up -d"

  deploy-production:
    name: Deploy (production)
    needs: build-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Deploy placeholder
        env:
          API_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/api:${{ github.ref_name }}
          WEB_IMAGE: ${{ env.REGISTRY }}/${{ github.repository }}/web:${{ github.ref_name }}
        run: |
          echo "Tag release deploy — wire production secrets in Environment 'production'."
          echo "API_IMAGE=$API_IMAGE"
          echo "WEB_IMAGE=$WEB_IMAGE"
