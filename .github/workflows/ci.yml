# Quality gates for every PR and push to main.
# CD (container publish) runs separately in cd.yml after merge to main.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NODE_ENV: test
  JWT_SECRET: ci-jwt-secret-minimum-thirty-two-chars-long
  DATABASE_URL: postgresql://soenglish:soenglish@localhost:5432/soenglish?schema=public

jobs:
  quality:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-monorepo
        with:
          skip-prisma: 'false'
      - run: npm run lint
      - run: npm run typecheck

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-monorepo
      - run: npm run build:email-templates
      - run: npm run test:unit

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: soenglish
          POSTGRES_PASSWORD: soenglish
          POSTGRES_DB: soenglish
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U soenglish -d soenglish"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-monorepo
      - run: npm run build:email-templates
      - run: npm run prisma:migrate:deploy
      - run: npm run test:integration
        env:
          RUN_INTEGRATION_TESTS: '1'

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [quality]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-monorepo
      - run: npm run build:email-templates
      - run: npm run build:api
      - run: npm run build:web
        env:
          # Next.js collects env at build time; placeholders for CI only.
          API_PROXY_TARGET: http://127.0.0.1:3000
          NEXT_PUBLIC_API_URL: /api

  ci-success:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [quality, unit, integration, build]
    if: always()
    steps:
      - name: Require all jobs
        run: |
          echo "quality:     ${{ needs.quality.result }}"
          echo "unit:        ${{ needs.unit.result }}"
          echo "integration: ${{ needs.integration.result }}"
          echo "build:       ${{ needs.build.result }}"
          failed=""
          [ "${{ needs.quality.result }}" = "success" ] || failed="$failed quality"
          [ "${{ needs.unit.result }}" = "success" ] || failed="$failed unit"
          [ "${{ needs.integration.result }}" = "success" ] || failed="$failed integration"
          [ "${{ needs.build.result }}" = "success" ] || failed="$failed build"
          if [ -n "$failed" ]; then
            echo "::error::CI gate — failed job(s):$failed (open those jobs in Actions for logs)"
            exit 1
          fi
